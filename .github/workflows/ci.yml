name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install semgrep sigma-cli pysigma-backend-opensearch pysigma-pipeline-sysmon
      - name: Lint (ruff)
        run: ruff check soc_autopilot tests
      - name: Semgrep — no unsafe Jinja (RCE guard)
        run: semgrep --config .semgrep/no-unsafe-jinja.yml soc_autopilot/ --error
      - name: Tests (offline; live-indexer integration tests self-skip)
        run: python -m pytest tests/ -v
