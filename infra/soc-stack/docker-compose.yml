# ==========================================================================
#  soc-stack — Voie B : tourne directement sur l'HÔTE (pas de VM soc-lab).
#
#  Pour l'instant : PostgreSQL (backend des cas + données de l'app).
#  TheHive / Cassandra / Elasticsearch sont VOLONTAIREMENT désactivés
#  (contrainte RAM ~12 Go). Le playbook écrit les cas dans une table `cases`
#  via l'interface CaseBackend. Pour réactiver TheHive plus tard :
#  décommente le bloc ci-dessous et passe CASE_BACKEND=thehive dans .env.
#
#  Lancement :  cd infra/soc-stack && docker compose up -d
# ==========================================================================
name: soc-stack

services:
  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    environment:
      POSTGRES_DB: soc_autopilot
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD dans infra/soc-stack/.env}
    ports:
      - "127.0.0.1:5432:5432"     # exposé uniquement en local sur l'hôte (l'app tourne sur l'hôte)
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_autopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # OPTIONNEL — TheHive (désactivé en Voie B pour économiser ~3 Go de RAM).
  # Décommenter l'ensemble + passer CASE_BACKEND=thehive pour l'activer.
