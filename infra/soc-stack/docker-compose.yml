  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #   volumes: [ "es-data:/usr/share/elasticsearch/data" ]
  #   restart: unless-stopped
  #
  # thehive:
  #   image: strangebee/thehive:5.2
