apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "soc-autopilot.fullname" . }}
  labels:
    {{- include "soc-autopilot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "soc-autopilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soc-autopilot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "soc-autopilot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: soc-autopilot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecretName }}
            - configMapRef:
                name: {{ include "soc-autopilot.fullname" . }}-config
          volumeMounts:
            - name: playbooks
              mountPath: /app/playbooks
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: playbooks
          configMap:
            name: {{ .Values.externalPlaybooksConfigMap }}
        - name: tmp
          emptyDir: {}
