{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "soc-autopilot.fullname" . }}
  labels:
    {{- include "soc-autopilot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "soc-autopilot.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # DNS (kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53 # fallback DNS (réponses tronquées)
    {{- range .Values.networkPolicy.allowedEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
