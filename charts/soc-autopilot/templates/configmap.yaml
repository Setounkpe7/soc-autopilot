apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soc-autopilot.fullname" . }}-config
  labels:
    {{- include "soc-autopilot.labels" . | nindent 4 }}
data:
  DRY_RUN: {{ .Values.config.dryRun | quote }}
  APPROVAL_TIMEOUT_SECONDS: {{ .Values.config.approvalTimeoutSeconds | quote }}
  PLAYBOOKS_DIR: {{ .Values.config.playbooksDir | quote }}
  WAZUH_API_URL: {{ .Values.config.wazuhApiUrl | quote }}
  THREAT_INTEL_URL: {{ .Values.config.threatIntelUrl | quote }}
  SLACK_ALERT_CHANNEL: {{ .Values.config.slackAlertChannel | quote }}
  SLACK_ACTION_CHANNEL: {{ .Values.config.slackActionChannel | quote }}
